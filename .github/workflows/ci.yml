name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build server
        run: pnpm --filter @transweave/server build

      - name: Build web
        run: pnpm --filter @transweave/web build

      - name: Run e2e tests
        run: pnpm --filter @transweave/server run test:e2e
        env:
          JWT_SECRET: e2e-test-jwt-secret-12345
          NODE_OPTIONS: '--experimental-vm-modules'

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -f packages/server/Dockerfile .

      - name: Build web image
        run: docker build -f packages/web/Dockerfile .
