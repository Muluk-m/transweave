name: Require Lock File

on:
  pull_request:
    branches:
      - main
      - develop
      - test
      - main-1
      - master

jobs:
  check-lock-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check for lock file
        run: |
          echo "Checking committed files for a lock file…"
          files=$(git ls-files | grep -E '(^|/)(package-lock.json|yarn.lock|pnpm-lock.yaml|composer.lock|go.sum)$' || true)
          if [ -n "$files" ]; then
            echo "在以下路径发现锁文件："
            echo "$files"
          else
            echo "未在任何子目录下发现锁文件，合并被阻止。"
            exit 1
          fi
