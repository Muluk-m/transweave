<svg viewBox="0 0 200 40" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="tw-wm-gradient" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Icon at left (32x32, offset by 4px for vertical centering in 40px height) -->
  <g transform="translate(4, 4)">
    <rect width="32" height="32" rx="6" fill="url(#tw-wm-gradient)"/>
    <!-- Weaving motif: two diagonal bands crossing -->
    <!-- Band 2 (under): top-right to bottom-left — split into two segments -->
    <rect x="13" y="6" width="6" height="9" rx="3" fill="white" opacity="0.9" transform="rotate(-45 16 16)"/>
    <rect x="13" y="17" width="6" height="9" rx="3" fill="white" opacity="0.9" transform="rotate(-45 16 16)"/>
    <!-- Band 1 (over): top-left to bottom-right — single unbroken band -->
    <rect x="13" y="6" width="6" height="20" rx="3" fill="white" transform="rotate(45 16 16)"/>
  </g>
  <!-- Wordmark text — vertically centered with icon -->
  <text
    x="44"
    y="26"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="600"
    font-size="20"
    fill="#0f172a"
    letter-spacing="-0.5"
  >Transweave</text>
</svg>
