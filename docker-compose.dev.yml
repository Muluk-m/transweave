services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-i18n}
      POSTGRES_USER: ${POSTGRES_USER:-i18n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-i18n} -d ${POSTGRES_DB:-i18n}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-i18n}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-i18n}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3001
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    depends_on:
      - server
    environment:
      NEXT_INTERNAL_API_URL: http://server:3001
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  pgdata:
    # WARNING: Adding name: creates a new volume. Existing data in the old implicit
    # volume must be manually migrated. See docs for guidance.
    name: transweave-pgdata
