# =============================================================================
# Transweave — Production Self-Hosting
# =============================================================================
# Quick start:
#   1. Copy .env.example to .env and set JWT_SECRET + POSTGRES_PASSWORD
#   2. docker compose -f docker-compose.production.yml up -d
#
# Images are pulled from Docker Hub: mulukma/transweave-{server,web}:latest
# GHCR mirrors also available: ghcr.io/muluk-m/transweave-{server,web}:latest
# Pin a specific version by replacing :latest with e.g. :1.2.3
# =============================================================================

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-i18n}
      POSTGRES_USER: ${POSTGRES_USER:-i18n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-i18n} -d ${POSTGRES_DB:-i18n}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    image: mulukma/transweave-server:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-i18n}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-i18n}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      AI_ENCRYPTION_KEY: ${AI_ENCRYPTION_KEY:-}
      PORT: 3001
    restart: unless-stopped

  web:
    image: mulukma/transweave-web:latest
    depends_on:
      - server
    environment:
      NEXT_INTERNAL_API_URL: http://server:3001
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  pgdata:
    name: transweave-pgdata
