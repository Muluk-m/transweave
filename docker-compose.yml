services:
  mongodb:
    image: mongodb/mongodb-community-server:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGODB_INITDB_ROOT_USERNAME: admin
      MONGODB_INITDB_ROOT_PASSWORD: secret
    volumes:
      - ./conf/mongo-keyfile:/data/keyfile/mongo-keyfile
      - mongodb_data:/data/db
      - ./init/init-replica.js:/docker-entrypoint-initdb.d/init-replica.js
    command: >
      --keyFile /data/keyfile/mongo-keyfile
      --replSet rs0
      --bind_ip_all
    networks:
      - i18n-network

  # server:
