databases:
  - name: transweave-db
    databaseName: transweave
    user: transweave
    plan: free

services:
  - type: web
    name: transweave-server
    runtime: docker
    dockerfilePath: packages/server/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transweave-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_RESET_SECRET
        generateValue: true
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production

  - type: cron
    name: transweave-demo-reset
    runtime: node
    buildCommand: echo 'no build needed'
    startCommand: node -e "fetch(process.env.SERVER_URL+'/api/seed/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({secret:process.env.DEMO_RESET_SECRET})}).then(r=>{console.log('Status:',r.status);return r.text()}).then(t=>{console.log(t);process.exit(0)}).catch(e=>{console.error(e);process.exit(1)})"
    schedule: "0 4 * * *"
    plan: free
    envVars:
      - key: DEMO_RESET_SECRET
        fromService:
          name: transweave-server
          type: web
          envVarKey: DEMO_RESET_SECRET
      - key: SERVER_URL
        fromService:
          name: transweave-server
          type: web
          property: host

  - type: web
    name: transweave-web
    runtime: docker
    dockerfilePath: packages/web/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NEXT_INTERNAL_API_URL
        fromService:
          name: transweave-server
          type: web
          property: host
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
